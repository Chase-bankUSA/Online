<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premier - Secure Access</title>
    <style>
        :root { --gold: #d4af37; --dark: #0b0c0d; --surface: #1a1c1e; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        
        .login-container { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 340px; text-align: center; border-top: 5px solid var(--gold); }
        
        /* CSS Nexus Logo */
        .logo-box { width: 60px; height: 60px; background: var(--dark); margin: 0 auto 20px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo-text { color: var(--gold); font-size: 2rem; font-weight: bold; font-family: serif; }
        
        .brand-header h1 { font-size: 1.4rem; color: var(--dark); margin: 0; letter-spacing: 2px; }
        .brand-header p { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; font-weight: bold; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; background: #fafafa; }
        input:focus { border-color: var(--gold); outline: none; background: white; }
        
        button.login-btn { width: 100%; padding: 15px; background-color: var(--dark); color: var(--gold); border: 1px solid var(--gold); border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: bold; margin-top: 15px; transition: 0.3s; letter-spacing: 1px; }
        button.login-btn:hover { background-color: var(--gold); color: var(--dark); }
        
        /* Spinner */
        .loading-area { display: none; margin-top: 20px; }
        .spinner { width: 25px; height: 25px; border: 3px solid #f3f3f3; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #message { font-size: 0.8rem; font-weight: 500; min-height: 20px; color: #666; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-box"><span class="logo-text">N</span></div>
    
    <div class="brand-header">
        <h1>NEXUS PREMIER</h1>
        <p>Private Wealth Access</p>
    </div>
    
    <form id="loginForm">
        <input type="text" id="user" placeholder="Username" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit" class="login-btn" id="loginBtn">SECURE SIGN IN</button>
    </form>
    
    <div class="loading-area" id="loadingArea">
        <div class="spinner"></div>
        <p id="message">Verifying Identity...</p>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const area = document.getElementById('loadingArea');
        const msg = document.getElementById('message');
        const btn = document.getElementById('loginBtn');

        if (u === "hyun56" && p === "Hyun#1590") {
            // Success Path
            btn.style.display = "none";
            area.style.display = "block";
            
            setTimeout(() => {
                msg.textContent = "Identity Confirmed. Accessing Vault...";
                msg.style.color = "#27ae60";
                
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000);
            }, 4000); // 4 Second processing delay

        } else {
            // Failure Path
            area.style.display = "block";
            document.querySelector('.spinner').style.display = "none";
            msg.textContent = "Access Denied: Invalid Credentials";
            msg.style.color = "#c0392b";
            
            setTimeout(() => {
                area.style.display = "none";
                document.querySelector('.spinner').style.display = "block";
                btn.style.display = "block";
            }, 2000);
        }
    });
</script>

</body>
</html>

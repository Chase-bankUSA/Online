<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Premier - Secure Login</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .login-container { background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 360px; text-align: center; border-top: 4px solid #d4af37; }
        
        /* Generic Branding */
        .brand-header { margin-bottom: 25px; }
        .brand-name { font-size: 1.5rem; font-weight: bold; color: #1a1c1e; letter-spacing: 2px; margin: 0; }
        .brand-sub { font-size: 0.7rem; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: #d4af37; outline: none; box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
        
        button.login-btn { width: 100%; padding: 14px; background-color: #1a1c1e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button.login-btn:hover { background-color: #d4af37; color: #1a1c1e; }
        
        .forgot-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 0.85rem; margin-top: 20px; text-decoration: none; display: inline-block; }
        .forgot-btn:hover { color: #d4af37; text-decoration: underline; }
        
        #message { font-size: 0.85rem; margin-top: 15px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-header">
        <h1 class="brand-name">NEXUS PREMIER</h1>
        <div class="brand-sub">Private Banking Portal</div>
    </div>
    
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="login-btn">Secure Sign In</button>
    </form>
    
    <button type="button" class="forgot-btn" onclick="showBranchMessage()">Forgot password?</button>
    
    <p id="message"></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const userField = document.getElementById('username').value;
        const passField = document.getElementById('password').value;
        const msg = document.getElementById('message');

        // Note: In a real app, redirection logic would go here
        if (userField === "hyun56" && passField === "Hyun#1590") {
            msg.style.color = "#27ae60";
            msg.textContent = "Identity Verified. Accessing Dashboard...";
            setTimeout(() => {
                window.location.href = "dashboard.html"; // Ensure this matches your filename
            }, 1500);
        } else {
            msg.style.color = "#c0392b";
            msg.textContent = "The credentials entered do not match our records.";
        }
    });

    function showBranchMessage() {
        alert("For security purposes, please visit your local Nexus Premier branch to reset your credentials.");
    }
</script>

</body>
</html>
